[tool.ruff]
line-length = 88
target-version = "py311"
exclude = [
    "migrations",
    "static",
    "media",
    "node_modules",
    ".venv",
]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # import sorting
    "UP",  # pyupgrade
    "B",   # bugbear
    "DJ",  # django-specific rules
]
ignore = [
    "E501",  # handled by formatter
]

[tool.ruff.lint.per-file-ignores]
# Django migrations often violate style rules
"*/migrations/*.py" = ["E501", "F401", "F841"]

# Settings files often have unused imports / complex patterns
"*/settings/*.py" = ["F401"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
