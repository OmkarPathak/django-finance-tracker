  <g stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round">
    <path d="M160 20L163 23M163 20L160 23"/>
    <path d="M30 125L32 127M32 125L30 127"/>
    <circle cx="165" cy="108" r="2" fill="#1D9E75" fill-opacity="0.15"/>
