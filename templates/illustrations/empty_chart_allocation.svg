<svg width="200" height="160" viewBox="0 0 200 160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background horizontal streaks -->
  <rect x="20" y="62" width="160" height="10" rx="5" fill="#1D9E75" fill-opacity="0.06"/>
  <rect x="35" y="78" width="130" height="8" rx="4" fill="#1D9E75" fill-opacity="0.08"/>
  <rect x="50" y="92" width="100" height="6" rx="3" fill="#1D9E75" fill-opacity="0.05"/>
  <rect x="10" y="48" width="80" height="6" rx="3" fill="#1D9E75" fill-opacity="0.04"/>
  <rect x="130" y="48" width="60" height="6" rx="3" fill="#1D9E75" fill-opacity="0.04"/>

  <!-- Stacked horizontal bars (allocation) -->
  <g transform="translate(45, 25)">
    <!-- Bar backgrounds -->
    <rect x="0" y="0" width="110" height="14" rx="4" stroke="#1D9E75" stroke-width="2" fill="white"/>
    <rect x="0" y="22" width="110" height="14" rx="4" stroke="#1D9E75" stroke-width="2" fill="white"/>
    <rect x="0" y="44" width="110" height="14" rx="4" stroke="#1D9E75" stroke-width="2" fill="white"/>
    <rect x="0" y="66" width="110" height="14" rx="4" stroke="#1D9E75" stroke-width="2" fill="white"/>

    <!-- Filled portions (varying widths to show allocation) -->
    <rect x="1" y="1" width="75" height="12" rx="3" fill="#1D9E75" fill-opacity="0.25"/>
    <rect x="1" y="23" width="55" height="12" rx="3" fill="#1D9E75" fill-opacity="0.18"/>
    <rect x="1" y="45" width="35" height="12" rx="3" fill="#1D9E75" fill-opacity="0.12"/>
    <rect x="1" y="67" width="90" height="12" rx="3" fill="#1D9E75" fill-opacity="0.08"/>

    <!-- Labels (dots) -->
    <circle cx="-8" cy="7" r="3" fill="#1D9E75" opacity="0.5"/>
    <circle cx="-8" cy="29" r="3" fill="#1D9E75" opacity="0.35"/>
    <circle cx="-8" cy="51" r="3" fill="#1D9E75" opacity="0.2"/>
    <circle cx="-8" cy="73" r="3" fill="#1D9E75" opacity="0.1"/>
  </g>

