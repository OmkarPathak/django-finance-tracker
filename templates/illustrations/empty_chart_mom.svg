<svg width="200" height="160" viewBox="0 0 200 160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background horizontal streaks -->
  <rect x="20" y="62" width="160" height="10" rx="5" fill="#1D9E75" fill-opacity="0.06"/>
  <rect x="35" y="78" width="130" height="8" rx="4" fill="#1D9E75" fill-opacity="0.08"/>
  <rect x="50" y="92" width="100" height="6" rx="3" fill="#1D9E75" fill-opacity="0.05"/>
  <rect x="10" y="48" width="80" height="6" rx="3" fill="#1D9E75" fill-opacity="0.04"/>
  <rect x="130" y="48" width="60" height="6" rx="3" fill="#1D9E75" fill-opacity="0.04"/>

  <!-- Grouped bar chart (month-over-month comparison) -->
  <g transform="translate(35, 20)">
    <!-- Axes -->
    <path d="M15 95H130" stroke="#1D9E75" stroke-width="2" stroke-linecap="round" opacity="0.15"/>
    <path d="M15 15V95" stroke="#1D9E75" stroke-width="2" stroke-linecap="round" opacity="0.15"/>
    
    <!-- Month 1 pair -->
    <rect x="22" y="50" width="10" height="45" rx="3" fill="#1D9E75" fill-opacity="0.35"/>
    <rect x="34" y="60" width="10" height="35" rx="3" fill="#1D9E75" fill-opacity="0.15"/>
    
    <!-- Month 2 pair -->
    <rect x="52" y="35" width="10" height="60" rx="3" fill="#1D9E75" fill-opacity="0.35"/>
    <rect x="64" y="45" width="10" height="50" rx="3" fill="#1D9E75" fill-opacity="0.15"/>
    
    <!-- Month 3 pair -->
    <rect x="82" y="42" width="10" height="53" rx="3" fill="#1D9E75" fill-opacity="0.35"/>
    <rect x="94" y="55" width="10" height="40" rx="3" fill="#1D9E75" fill-opacity="0.15"/>

    <!-- Arrow showing comparison -->
    <path d="M27 45L27 38" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
    <path d="M24 40L27 37L30 40" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>
  </g>

  <!-- Sparkle accents -->
  <g stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round">
    <path d="M165 22L168 25M168 22L165 25"/>
    <path d="M25 122L27 124M27 122L25 124"/>
    <circle cx="168" cy="102" r="2" fill="#1D9E75" fill-opacity="0.15"/>
    <circle cx="22" cy="25" r="1.5" fill="#1D9E75" fill-opacity="0.2"/>
  </g>
</svg>
