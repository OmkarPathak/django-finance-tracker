    <path d="M25 15H75" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
    <path d="M25 22H60" stroke="#1D9E75" stroke-width="1" stroke-linecap="round" opacity="0.15"/>
    
    <!-- Node 2 -->
    <circle cx="15" cy="42" r="5" fill="#1D9E75" fill-opacity="0.2" stroke="#1D9E75" stroke-width="2"/>
    <path d="M25 39H80" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
    <path d="M25 46H55" stroke="#1D9E75" stroke-width="1" stroke-linecap="round" opacity="0.15"/>
    
    <!-- Node 3 -->
    <circle cx="15" cy="66" r="5" stroke="#1D9E75" stroke-width="2" fill="white"/>
    <path d="M25 63H70" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
    <path d="M25 70H50" stroke="#1D9E75" stroke-width="1" stroke-linecap="round" opacity="0.15"/>
    
