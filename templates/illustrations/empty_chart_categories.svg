<svg width="200" height="160" viewBox="0 0 200 160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background horizontal streaks -->
  <rect x="20" y="62" width="160" height="10" rx="5" fill="#1D9E75" fill-opacity="0.06"/>
  <rect x="35" y="78" width="130" height="8" rx="4" fill="#1D9E75" fill-opacity="0.08"/>
  <rect x="50" y="92" width="100" height="6" rx="3" fill="#1D9E75" fill-opacity="0.05"/>
  <rect x="10" y="48" width="80" height="6" rx="3" fill="#1D9E75" fill-opacity="0.04"/>
  <rect x="130" y="48" width="60" height="6" rx="3" fill="#1D9E75" fill-opacity="0.04"/>

  <!-- Donut chart (category breakdown) -->
  <g transform="translate(100, 72)">
    <!-- Outer donut segments -->
    <circle cx="0" cy="0" r="38" stroke="#1D9E75" stroke-width="12" stroke-dasharray="60 180" stroke-dashoffset="0" fill="none" opacity="0.7"/>
    <circle cx="0" cy="0" r="38" stroke="#1D9E75" stroke-width="12" stroke-dasharray="45 195" stroke-dashoffset="-65" fill="none" opacity="0.45"/>
    <circle cx="0" cy="0" r="38" stroke="#1D9E75" stroke-width="12" stroke-dasharray="35 205" stroke-dashoffset="-115" fill="none" opacity="0.25"/>
    <circle cx="0" cy="0" r="38" stroke="#1D9E75" stroke-width="12" stroke-dasharray="90 150" stroke-dashoffset="-155" fill="none" opacity="0.12"/>
    <!-- Inner white circle -->
    <circle cx="0" cy="0" r="28" fill="white" stroke="#1D9E75" stroke-width="1" stroke-opacity="0.1"/>
    <!-- Rupee in center -->
    <text x="0" y="5" text-anchor="middle" font-family="system-ui" font-size="16" fill="#1D9E75" opacity="0.4">₹</text>
  </g>

  <!-- Sparkle accents -->
  <g stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round">
    <path d="M155 18L158 21M158 18L155 21"/>
    <path d="M38 120L40 122M40 120L38 122"/>
    <circle cx="162" cy="105" r="2" fill="#1D9E75" fill-opacity="0.15"/>
    <circle cx="32" cy="25" r="1.5" fill="#1D9E75" fill-opacity="0.2"/>
  </g>
</svg>
