  <rect x="20" y="62" width="160" height="10" rx="5" fill="#1D9E75" fill-opacity="0.06"/>
  <rect x="35" y="78" width="130" height="8" rx="4" fill="#1D9E75" fill-opacity="0.08"/>
  <rect x="50" y="92" width="100" height="6" rx="3" fill="#1D9E75" fill-opacity="0.05"/>
  <rect x="10" y="48" width="80" height="6" rx="3" fill="#1D9E75" fill-opacity="0.04"/>
  <rect x="130" y="48" width="60" height="6" rx="3" fill="#1D9E75" fill-opacity="0.04"/>

  <!-- Line chart (daily spending trend) -->
  <g transform="translate(35, 22)">
    <!-- Axes -->
    <path d="M15 90H125" stroke="#1D9E75" stroke-width="2" stroke-linecap="round" opacity="0.15"/>
    <path d="M15 15V90" stroke="#1D9E75" stroke-width="2" stroke-linecap="round" opacity="0.15"/>
    <!-- Grid lines -->
    <path d="M15 35H125" stroke="#1D9E75" stroke-width="0.5" stroke-dasharray="3 4" opacity="0.1"/>
    <path d="M15 55H125" stroke="#1D9E75" stroke-width="0.5" stroke-dasharray="3 4" opacity="0.1"/>
    <path d="M15 75H125" stroke="#1D9E75" stroke-width="0.5" stroke-dasharray="3 4" opacity="0.1"/>
    
    <!-- Smooth area fill -->
    <path d="M20 70C30 65 40 45 55 50C70 55 80 30 95 38C105 43 115 55 120 50V90H20Z" fill="#1D9E75" fill-opacity="0.06"/>
    <!-- Line -->
    <path d="M20 70C30 65 40 45 55 50C70 55 80 30 95 38C105 43 115 55 120 50" stroke="#1D9E75" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Data dots -->
    <circle cx="20" cy="70" r="3" fill="white" stroke="#1D9E75" stroke-width="2"/>
    <circle cx="55" cy="50" r="3" fill="white" stroke="#1D9E75" stroke-width="2"/>
    <circle cx="95" cy="38" r="3" fill="white" stroke="#1D9E75" stroke-width="2"/>
