<svg width="200" height="160" viewBox="0 0 200 160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background horizontal streaks -->
  <rect x="20" y="62" width="160" height="10" rx="5" fill="#1D9E75" fill-opacity="0.06"/>
  <rect x="35" y="78" width="130" height="8" rx="4" fill="#1D9E75" fill-opacity="0.08"/>
  <rect x="50" y="92" width="100" height="6" rx="3" fill="#1D9E75" fill-opacity="0.05"/>
  <rect x="10" y="48" width="80" height="6" rx="3" fill="#1D9E75" fill-opacity="0.04"/>
  <rect x="130" y="48" width="60" height="6" rx="3" fill="#1D9E75" fill-opacity="0.04"/>

  <!-- Line chart with future projection (dashed) -->
  <g transform="translate(30, 22)">
    <!-- Axes -->
    <path d="M15 90H140" stroke="#1D9E75" stroke-width="2" stroke-linecap="round" opacity="0.15"/>
    <path d="M15 15V90" stroke="#1D9E75" stroke-width="2" stroke-linecap="round" opacity="0.15"/>
    
    <!-- Historical line (solid) -->
    <path d="M20 65L40 55L60 60L80 45L95 50" stroke="#1D9E75" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Data dots -->
    <circle cx="20" cy="65" r="3" fill="white" stroke="#1D9E75" stroke-width="2"/>
    <circle cx="60" cy="60" r="3" fill="white" stroke="#1D9E75" stroke-width="2"/>
    <circle cx="95" cy="50" r="3" fill="white" stroke="#1D9E75" stroke-width="2"/>
    
    <!-- "Now" divider -->
    <path d="M95 20V90" stroke="#1D9E75" stroke-width="1" stroke-dasharray="3 3" opacity="0.25"/>
    
    <!-- Projected line (dashed, trending up) -->
    <path d="M95 50L115 40L135 30" stroke="#1D9E75" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="6 4" opacity="0.4"/>
    <!-- Projection area -->
    <path d="M95 50L115 40L135 30V90H95Z" fill="#1D9E75" fill-opacity="0.04"/>
    
    <!-- Arrow at end -->
    <path d="M130 35L136 29M136 29L136 36" stroke="#1D9E75" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>
  </g>

  <!-- Sparkle accents -->
  <g stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round">
    <path d="M170 22L173 25M173 22L170 25"/>
    <path d="M22 120L24 122M24 120L22 122"/>
    <circle cx="172" cy="100" r="2" fill="#1D9E75" fill-opacity="0.15"/>
    <circle cx="18" cy="25" r="1.5" fill="#1D9E75" fill-opacity="0.2"/>
  </g>
</svg>
