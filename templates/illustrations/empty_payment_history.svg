    <path d="M10 8C10 5.79 11.79 4 14 4H66C68.21 4 70 5.79 70 8V95L63 89L56 95L49 89L42 95L35 89L28 95L21 89L10 96V8Z" stroke="#1D9E75" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="white"/>
    
    <!-- Header line -->
    <path d="M22 18H58" stroke="#1D9E75" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
    <!-- Divider -->
    <path d="M18 28H62" stroke="#1D9E75" stroke-width="1" stroke-linecap="round" stroke-dasharray="3 2" opacity="0.15"/>
    
    <!-- Row 1 -->
    <path d="M22 38H42" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
    <path d="M50 38H58" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
    <!-- Row 2 -->
    <path d="M22 48H38" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
    <path d="M50 48H58" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
    <!-- Row 3 -->
    <path d="M22 58H45" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
    <path d="M50 58H58" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
    
    <!-- Total divider -->
    <path d="M18 68H62" stroke="#1D9E75" stroke-width="1" stroke-linecap="round" opacity="0.15"/>
    <!-- Total -->
    <path d="M22 78H35" stroke="#1D9E75" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
    <text x="58" y="81" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#1D9E75" opacity="0.45">₹0</text>

    <!-- Checkmark badge -->
    <circle cx="68" cy="10" r="12" fill="white" stroke="#1D9E75" stroke-width="2.5"/>
    <path d="M62 10L66 14L75 5" stroke="#1D9E75" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
