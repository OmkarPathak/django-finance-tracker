<svg width="200" height="160" viewBox="0 0 200 160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background horizontal streaks -->
  <rect x="20" y="62" width="160" height="10" rx="5" fill="#1D9E75" fill-opacity="0.06"/>
  <rect x="35" y="78" width="130" height="8" rx="4" fill="#1D9E75" fill-opacity="0.08"/>
  <rect x="50" y="92" width="100" height="6" rx="3" fill="#1D9E75" fill-opacity="0.05"/>
  <rect x="10" y="48" width="80" height="6" rx="3" fill="#1D9E75" fill-opacity="0.04"/>
  <rect x="130" y="48" width="60" height="6" rx="3" fill="#1D9E75" fill-opacity="0.04"/>

  <!-- Bank building -->
  <g transform="translate(55, 18)">
    <!-- Pediment / Roof -->
    <path d="M10 40L45 10L80 40" stroke="#1D9E75" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="white"/>
    <!-- Body -->
    <rect x="12" y="40" width="66" height="50" rx="3" stroke="#1D9E75" stroke-width="2.5" fill="white"/>
    <!-- Columns -->
    <path d="M28 45V85" stroke="#1D9E75" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M45 45V85" stroke="#1D9E75" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M62 45V85" stroke="#1D9E75" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Door -->
    <path d="M39 90V72C39 69 41 67 45 67C49 67 51 69 51 72V90" stroke="#1D9E75" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Flag/accent on top -->
    <circle cx="45" cy="10" r="4" stroke="#1D9E75" stroke-width="2" fill="white"/>
  </g>

  <!-- Sparkle accents -->
  <g stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round">
    <path d="M148 20L151 23M151 20L148 23"/>
    <path d="M42 115L44 117M44 115L42 117"/>
    <circle cx="158" cy="105" r="2" fill="#1D9E75" fill-opacity="0.15"/>
    <circle cx="35" cy="25" r="1.5" fill="#1D9E75" fill-opacity="0.2"/>
  </g>
</svg>
