    <rect x="5" y="20" width="45" height="55" rx="6" stroke="#1D9E75" stroke-width="2.5" fill="white"/>
    <path d="M15 35H40" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
    <path d="M15 43H35" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
    <circle cx="20" cy="60" r="5" stroke="#1D9E75" stroke-width="1.5" fill="none"/>

    <!-- Right card -->
    <rect x="70" y="20" width="45" height="55" rx="6" stroke="#1D9E75" stroke-width="2.5" fill="white"/>
    <path d="M80 35H105" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
    <path d="M80 43H100" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
    <circle cx="85" cy="60" r="5" stroke="#1D9E75" stroke-width="1.5" fill="none"/>

    <!-- Transfer arrows -->
    <path d="M52 38L68 38" stroke="#1D9E75" stroke-width="2" stroke-linecap="round"/>
    <path d="M65 34L69 38L65 42" stroke="#1D9E75" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
